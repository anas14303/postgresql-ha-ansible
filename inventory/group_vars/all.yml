---
# PostgreSQL version
postgresql_version: 16

# Feature flags
postgresql_install: true
postgresql_initialize: true
postgresql_configure: true
postgresql_manage_objects: true
postgresql_service_enabled: true
postgresql_service_state: started

# Network
postgresql_port: 5432
postgresql_listen_addresses: '*'

# Security
postgresql_auth_method: scram-sha-256

# Disable features we don't need yet
postgresql_backup: false
postgresql_autotune: false
postgresql_is_patroni: true

# pg_hba entries
postgresql_hba_entries:
  - contype: local
    databases: all
    users: postgres
    method: peer
  - contype: host
    databases: all
    users: all
    address: 127.0.0.1/32
    method: scram-sha-256
  - contype: host
    databases: all
    users: all
    address: "::1/128"
    method: scram-sha-256
  - contype: hostssl
    databases: replication
    users: replicator
    address: 192.168.163.128/32
    method: scram-sha-256
  - contype: hostssl
    databases: replication
    users: replicator
    address: 192.168.163.129/32
    method: scram-sha-256


# =============================================================
# Backup configuration (Phase 5)
# =============================================================
postgresql_backup_root_dir: /var/backups/postgresql
postgresql_backup_create_database: "yes"
postgresql_backup_dbnames: "all"
postgresql_backup_schedule:
  minute: 0
  hour: 2
postgresql_backup_brdaily: 7
postgresql_backup_doweekly: 6
postgresql_backup_brweekly: 4
postgresql_backup_domonthly: 1
postgresql_backup_brmontly: 6
postgresql_backup_perm: "600"
postgresql_backup_mail_addr: ""

# =============================================================
# Monitoring configuration (Phase 6)
# =============================================================
node_exporter_enabled_collectors:
  - systemd

postgres_exporter_env:
  DATA_SOURCE_NAME: "postgresql://postgres_exporter:REDACTED@localhost:5432/postgres?sslmode=disable"

postgres_exporter_user: postgres_exporter
postgres_exporter_password: "REDACTED"

prometheus_targets:
  node:
    - targets:
        - "192.168.163.129:9100"
        - "192.168.163.128:9100"
      labels:
        env: lab

prometheus_scrape_configs:
  - job_name: "node"
    file_sd_configs:
      - files:
          - "/etc/prometheus/file_sd/node.yml"
  - job_name: "postgres_exporter"
    static_configs:
      - targets:
          - "192.168.163.129:9187"
          - "192.168.163.128:9187"
        labels:
          env: lab
  - job_name: "patroni"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "192.168.163.129:8008"
          - "192.168.163.128:8008"
        labels:
          env: lab

# =============================================================
# Grafana configuration (Phase 6 continued)
# =============================================================
grafana_ini:
  server:
    http_port: 3000
  security:
    admin_user: admin
    admin_password: "REDACTED"
  database:
    type: sqlite3

grafana_datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: "http://localhost:9090"
    is_default: true

grafana_dashboards:
  - dashboard_id: '1860'
    revision_id: '37'
    datasource: 'Prometheus'
  - dashboard_id: '9628'
    revision_id: '7'
    datasource: 'Prometheus'

# =============================================================
# SSL configuration
# =============================================================
postgresql_ssl: true
postgresql_ssl_ca_file: /etc/postgresql/ssl/ca.crt
postgresql_ssl_cert_file: /etc/postgresql/ssl/server.crt
postgresql_ssl_key_file: /etc/postgresql/ssl/server.key
