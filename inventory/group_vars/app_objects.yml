---
# Databases
postgresql_databases:
  - name: appdb_crm
    owner: app_admin
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
  - name: appdb_analytics
    owner: app_admin
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
  - name: appdb_inventory
    owner: app_admin
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8

# Users
postgresql_users:
  - name: app_admin
    password: "Adm!nPass#2024"
    role_attr_flags: NOSUPERUSER,NOCREATEDB,NOCREATEROLE
  - name: app_readwrite
    password: "Rw!Pass#2024"
    role_attr_flags: NOSUPERUSER,NOCREATEDB,NOCREATEROLE
  - name: app_readonly
    password: "R0!Pass#2024"
    role_attr_flags: NOSUPERUSER,NOCREATEDB,NOCREATEROLE
  - name: postgres_exporter
    password: "Exp0rt3r#2024"
    role_attr_flags: NOSUPERUSER,NOCREATEDB,NOCREATEROLE

# Privileges
postgresql_privs:
  - db: appdb_crm
    roles: app_admin
    privs: ALL
    type: database
  - db: appdb_analytics
    roles: app_admin
    privs: ALL
    type: database
  - db: appdb_inventory
    roles: app_admin
    privs: ALL
    type: database
  - db: appdb_crm
    roles: app_readwrite
    privs: CONNECT
    type: database
  - db: appdb_crm
    roles: app_readwrite
    privs: SELECT,INSERT,UPDATE,DELETE
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  - db: appdb_inventory
    roles: app_readwrite
    privs: CONNECT
    type: database
  - db: appdb_inventory
    roles: app_readwrite
    privs: SELECT,INSERT,UPDATE,DELETE
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  - db: appdb_crm
    roles: app_readonly
    privs: CONNECT
    type: database
  - db: appdb_crm
    roles: app_readonly
    privs: SELECT
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  - db: appdb_analytics
    roles: app_readonly
    privs: CONNECT
    type: database
  - db: appdb_analytics
    roles: app_readonly
    privs: SELECT
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  - db: appdb_inventory
    roles: app_readonly
    privs: CONNECT
    type: database
  - db: appdb_inventory
    roles: app_readonly
    privs: SELECT
    type: table
    objs: ALL_IN_SCHEMA
    schema: public
  - db: postgres
    roles: postgres_exporter
    privs: pg_monitor
    type: group
