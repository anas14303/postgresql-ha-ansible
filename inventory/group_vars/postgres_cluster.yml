---
# Patroni cluster identity
patroni_group_name: postgres_cluster
patroni_scope: postgres-cluster
patroni_namespace: /service/

# DCS: etcd
patroni_dcs: etcd
patroni_etcd_hosts: "192.168.163.129:2379,192.168.163.128:2379,192.168.163.134:2379"

# PostgreSQL version
patroni_postgresql_version: 16
patroni_postgresql_port: 5432

# Users
patroni_superuser_username: postgres
patroni_superuser_password: "{{ vault_patroni_superuser_password }}"
patroni_replication_username: replicator
patroni_replication_password: "{{ vault_patroni_replication_password }}"

# Installation
patroni_install: true
patroni_install_from_pip: true

# pg_hba managed by Patroni
patroni_postgresql_pg_hba:
  - { type: "local", database: "all", user: "postgres", method: "peer" }
  - { type: "hostssl", database: "all", user: "all", address: "127.0.0.1/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "all", user: "all", address: "::1/128", method: "scram-sha-256" }
  - { type: "hostssl", database: "replication", user: "replicator", address: "192.168.163.129/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "replication", user: "replicator", address: "192.168.163.128/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "postgres", user: "postgres", address: "192.168.163.129/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "postgres", user: "postgres", address: "192.168.163.128/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "keycloak", user: "keycloak", address: "192.168.163.132/32", method: "scram-sha-256" }
  - { type: "hostssl", database: "keycloak", user: "keycloak", address: "192.168.163.133/32", method: "scram-sha-256" }

# PostgreSQL parameters
patroni_postgresql_parameters:
  - { option: "unix_socket_directories", value: "/var/run/postgresql" }
  - { option: "wal_log_hints", value: "on" }
  - { option: "shared_preload_libraries", value: "pgaudit" }
  - { option: "pgaudit.log", value: "write, ddl, role" }
  - { option: "pgaudit.log_catalog", value: "off" }
  - { option: "pgaudit.log_parameter", value: "on" }

patroni_postgresql_listen: "127.0.0.1,192.168.163.129,192.168.163.128:{{ patroni_postgresql_port }}"

# Watchdog required — verified working via promotion test 2026-07-09
patroni_watchdog_mode: 'required'

# REST API
patroni_restapi_port: 8008

# Integration with claranet.postgresql
patroni_prepare_for_postgresql_role: true
patroni_set_pg_conn_vars: true
patroni_set_pg_replication_role: true

# Data and config directories
patroni_postgresql_data_dir: /var/lib/postgresql/16/main
patroni_postgresql_config_dir: /etc/postgresql/16/main
