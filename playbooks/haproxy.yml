---
- name: Install and configure HAProxy
  hosts: haproxy
  become: yes

  tasks:
    - name: Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: yes

    - name: Ensure HAProxy cert directory exists
      ansible.builtin.file:
        path: /etc/haproxy/certs
        state: directory
        mode: '0750'
        owner: root
        group: haproxy

    - name: Fetch cert bundle from Keycloak node 1
      ansible.builtin.fetch:
        src: /etc/ssl/cluster/server.pem
        dest: /tmp/keycloak.pem
        flat: yes
      delegate_to: vm5

    - name: Push cert bundle to HAProxy node
      ansible.builtin.copy:
        src: /tmp/keycloak.pem
        dest: /etc/haproxy/certs/keycloak.pem
        mode: '0640'
        owner: root
        group: haproxy

    - name: Deploy HAProxy configuration
      ansible.builtin.template:
        src: /home/asus/postgres-devops/templates/haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        owner: root
        group: haproxy
        mode: '0640'
        validate: haproxy -c -f %s
      notify: Restart haproxy

    - name: Enable and start HAProxy
      ansible.builtin.systemd:
        name: haproxy
        enabled: yes
        state: started

  handlers:
    - name: Restart haproxy
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
