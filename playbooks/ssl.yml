---
- name: Generate self-signed SSL certificates
  hosts: all
  become: yes
  tasks:
    - name: Ensure openssl is installed
      ansible.builtin.apt:
        name: openssl
        state: present

    - name: Set cert owner (postgres on DB nodes, vault on vault node, root elsewhere)
      ansible.builtin.set_fact:
        cert_owner: "{{ 'postgres' if inventory_hostname in groups['postgres_cluster'] else ('vault' if inventory_hostname in groups['vault'] else 'root') }}"
        cert_group: "{{ 'postgres' if inventory_hostname in groups['postgres_cluster'] else ('vault' if inventory_hostname in groups['vault'] else 'root') }}"
    - name: Create SSL directory
      ansible.builtin.file:
        path: /etc/ssl/cluster
        state: directory
        owner: "{{ cert_owner }}"
        group: "{{ cert_group }}"
        mode: '0750'

    - name: Generate CA private key
      ansible.builtin.command:
        cmd: openssl genrsa -out /etc/ssl/cluster/ca.key 4096
        creates: /etc/ssl/cluster/ca.key

    - name: Generate CA certificate
      ansible.builtin.command:
        cmd: >
          openssl req -new -x509 -days 3650
          -key /etc/ssl/cluster/ca.key
          -out /etc/ssl/cluster/ca.crt
          -subj "/CN=Cluster-CA/O=Lab/C=TN"
        creates: /etc/ssl/cluster/ca.crt

    - name: Generate server private key
      ansible.builtin.command:
        cmd: openssl genrsa -out /etc/ssl/cluster/server.key 4096
        creates: /etc/ssl/cluster/server.key

    - name: Generate server CSR
      ansible.builtin.command:
        cmd: >
          openssl req -new
          -key /etc/ssl/cluster/server.key
          -out /etc/ssl/cluster/server.csr
          -subj "/CN={{ ansible_host }}/O=Lab/C=TN"
        creates: /etc/ssl/cluster/server.csr

    - name: Sign server certificate with CA
      ansible.builtin.command:
        cmd: >
          openssl x509 -req -days 3650
          -in /etc/ssl/cluster/server.csr
          -CA /etc/ssl/cluster/ca.crt
          -CAkey /etc/ssl/cluster/ca.key
          -CAcreateserial
          -out /etc/ssl/cluster/server.crt
        creates: /etc/ssl/cluster/server.crt

    - name: Set correct ownership and permissions
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: "{{ cert_owner }}"
        group: "{{ cert_group }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: /etc/ssl/cluster/ca.key,     mode: '0400' }
        - { path: /etc/ssl/cluster/ca.crt,     mode: '0444' }
        - { path: /etc/ssl/cluster/server.key, mode: '0400' }
        - { path: /etc/ssl/cluster/server.crt, mode: '0444' }

    - name: Create PEM bundle (cert + key) for HAProxy
      ansible.builtin.shell: |
        cat /etc/ssl/cluster/server.crt /etc/ssl/cluster/server.key > /etc/ssl/cluster/server.pem
        chmod 440 /etc/ssl/cluster/server.pem
      args:
        creates: /etc/ssl/cluster/server.pem
