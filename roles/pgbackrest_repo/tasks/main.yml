---
- name: Install prerequisites for PGDG repo
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
    state: present

- name: Add PGDG signing key
  ansible.builtin.get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
    mode: '0644'

- name: Add PGDG apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt {{ ansible_distribution_release }}-pgdg main"
    state: present
    filename: pgdg

- name: Install pgbackrest package
  ansible.builtin.apt:
    name: "pgbackrest={{ pgbackrest_version }}"
    state: present
    update_cache: true
- name: Create pgbackrest system user
  ansible.builtin.user:
    name: "{{ pgbackrest_user }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ pgbackrest_user }}"
    create_home: true
- name: Create repository directory
  ansible.builtin.file:
    path: "{{ pgbackrest_repo_path }}"
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: '0750'
- name: Create pgbackrest config directory
  ansible.builtin.file:
    path: /etc/pgbackrest
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: '0750'
- name: Create pgbackrest log directory with correct ownership
  ansible.builtin.file:
    path: /var/log/pgbackrest
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: '0750'
- name: Create .ssh directory for pgbackrest user
  ansible.builtin.file:
    path: "/home/{{ pgbackrest_user }}/.ssh"
    state: directory
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: '0700'
- name: Generate SSH key pair for pgbackrest user
  ansible.builtin.user:
    name: "{{ pgbackrest_user }}"
    generate_ssh_key: true
    ssh_key_type: ed25519
  register: pgbackrest_ssh_key
- name: Template pgbackrest.conf on the repo host
  ansible.builtin.template:
    src: pgbackrest_repo.conf.j2
    dest: /etc/pgbackrest/pgbackrest.conf
    owner: "{{ pgbackrest_user }}"
    group: "{{ pgbackrest_user }}"
    mode: '0640'
- name: Show pgbackrest user public key (needed for Phase B SSH trust setup)
  ansible.builtin.debug:
    msg: "{{ pgbackrest_ssh_key.ssh_public_key }}"
